# 将本文件内容合并进你的 Nginx server 块。生产环境请强制 HTTPS 并启用 HSTS。
autoindex off;

location ~ ^/(app|database|docs|deploy)/ {
    return 404;
}

location = /install.lock {
    return 404;
}

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy "default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;
# add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

# 上传图片存储目录禁止直接访问；图片只能走 /media.php?id=xxx 受控输出。
location ^~ /storage/ {
    deny all;
    return 404;
}

# 禁止上传目录中任何脚本被 PHP 解析。
location ~* ^/storage/.*\.(php|phtml|phar|php3|php4|php5|shtml|cgi|pl|sh)$ {
    deny all;
    return 404;
}
